name: phoneappanalysis
language: docker
variables:
  - name: MARIMO_MODE
    inputType: Options
    description: Mode to run Marimo in
    defaultValue: edit
  - name: MARIMO_NOTEBOOK
    inputType: FreeText
    description: The notebook file to open (e.g., main.py)
    defaultValue: main.py
  - name: ANTHROPIC_API_KEY
    inputType: Secret
    description: Token generated from https://platform.claude.com/settings/keys.
    defaultValue: claude_api_token
dockerfile: dockerfile
defaultFile: dockerfile
libraryItemId: marimo
